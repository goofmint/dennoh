language: ja
reviews:
  profile: assertive
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!bun.lock"
  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        TypeScript のコアコードをレビューします。以下を重点的に確認してください:
        - 型安全性: `any` および `unknown` 型の使用を指摘する。やむを得ない場合を除き TypeScript の `class` 使用を指摘する（Error 拡張など真に必要な場合のみ許容）。
        - 入力検証とエラー処理: MCP/CLI の入力検証が網羅されているか。エラー処理が適切か。
        - フォールバック禁止: `value || 'default'` のような暗黙のフォールバックを指摘する。設定や値が取得できない場合は明示的にエラーを出すべき。
        - セキュリティ: パストラバーサル、コマンドインジェクション、機密情報のログ漏えいを指摘する。
        - ファイル I/O・非同期処理: ファイル監視や DB 処理の競合・リソースリーク、未処理の Promise を指摘する。
        - 早期 return: ネストを減らすため早期 return を推奨する。
        - コメント: コメントは英語で、意図が明確に記述されているか確認する。
    - path: "tests/**/*.ts"
      instructions: |
        テストコードをレビューします。以下を重点的に確認してください:
        - 意味のあるアサーション: 形状チェックだけでなく振る舞いを検証しているか。
        - 過剰モック: 実際の振る舞いをテストしていない過剰なモックを指摘する。
        - エッジケース・エラー経路のカバレッジが十分か。
        - テストの独立性: テスト間に依存がないか。命名規約が一貫しているか。
        - 実装に合わせてテストを書かない。テスト要件に基づいてテストを記述しているか確認する。
        - テスト内の `if` 文を禁止する。条件分岐を含むテストを指摘する。
        - テストのスキップ（`.skip` 等）の使用を禁止する。
